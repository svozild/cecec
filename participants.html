<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CECEC 2026 &#8211; Participants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0D1B2A;
      --cyan:    #00C6D7;
      --cyan-dim:#007F8B;
      --white:   #F4F8FB;
      --gray:    #8FA3B1;
      --card-bg: #132233;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--white); font-size: 16px; line-height: 1.65; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; height: 64px;
      background: rgba(13,27,42,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,198,215,0.12);
    }
    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: .04em; color: var(--cyan); text-decoration: none; }
    .nav-logo span { color: var(--white); }
    .nav-back {
      background: rgba(0,198,215,.1); border: 1px solid rgba(0,198,215,.3);
      color: var(--cyan); padding: .4rem 1.1rem; border-radius: 4px;
      font-weight: 600; text-decoration: none; font-size: .875rem;
      transition: background .2s;
    }
    .nav-back:hover { background: rgba(0,198,215,.2); }

    main { max-width: 900px; margin: 0 auto; padding: 6rem 2rem 4rem; }

    .page-label { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--cyan); font-weight: 600; margin-bottom: .6rem; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; letter-spacing: -.02em; margin-bottom: .5rem; }
    .subtitle { color: var(--gray); font-size: .9rem; margin-bottom: 2.5rem; }
    #count { color: var(--cyan); font-weight: 600; }

    #loading { padding: 1rem 0; }
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid rgba(0,198,215,.08);
      border-radius: 8px;
      padding: 1rem 1.2rem;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(0,198,215,.25) 50%, rgba(255,255,255,.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      margin-bottom: .6rem;
    }
    .skeleton-line.name { width: 65%; height: 14px; }
    .skeleton-line.aff  { width: 90%; }
    .skeleton-line.aff2 { width: 75%; }
    .skeleton-line.tag  { width: 40%; height: 10px; margin-top: .4rem; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .participant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .participant-card {
      background: var(--card-bg);
      border: 1px solid rgba(0,198,215,.1);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      transition: border-color .2s;
    }
    .participant-card:hover { border-color: rgba(0,198,215,.3); }
    .participant-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: .95rem;
      color: var(--white);
      margin-bottom: .25rem;
    }
    .participant-affiliation {
      font-size: .8rem;
      color: var(--gray);
      line-height: 1.4;
    }
    .participant-country {
      font-size: .75rem;
      color: var(--cyan-dim);
      margin-top: .3rem;
      font-weight: 500;
    }
    .participant-type {
      display: inline-block;
      margin-top: .5rem;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .06em;
      padding: .15rem .5rem;
      border-radius: 3px;
      background: rgba(0,198,215,.1);
      color: var(--cyan);
      border: 1px solid rgba(0,198,215,.2);
    }
    .participant-type.attendee {
      background: rgba(255,255,255,.05);
      color: var(--gray);
      border-color: rgba(255,255,255,.1);
    }

    .chart-section {
      margin-bottom: 2.5rem;
    }
    .chart-section h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 1.2rem;
    }
    .chart-wrap {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .chart-canvas-wrap {
      width: 220px;
      height: 220px;
      flex-shrink: 0;
    }
    .chart-legend {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .82rem;
      color: #9DBCCC;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-count {
      margin-left: auto;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      color: var(--white);
      font-size: .8rem;
    }

    footer { border-top: 1px solid rgba(0,198,215,.1); text-align: center; padding: 2rem; color: var(--gray); font-size: .8rem; margin-top: 3rem; }
    footer a { color: var(--cyan-dim); text-decoration: none; }
    footer a:hover { color: var(--cyan); }

    @media (max-width: 600px) {
      nav { padding: 0 1.2rem; }
      main { padding: 5rem 1.2rem 3rem; }
      .participant-grid { grid-template-columns: 1fr; }
      .chart-canvas-wrap { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="./">CECEC<span> 2026</span></a>
  <a class="nav-back" href="./">← Back</a>
</nav>

<main>
  <p class="page-label">CECEC 2026</p>
  <h1>Registered Participants</h1>
  <p class="subtitle">This list updates automatically as new registrations arrive. Currently <span id="count">—</span> registered.</p>

  <div class="chart-section" id="chart-section" style="display:none;">
    <h2>Geographic Distribution</h2>
    <div class="chart-wrap">
      <div class="chart-canvas-wrap">
        <canvas id="geoChart"></canvas>
      </div>
      <div class="chart-legend" id="chart-legend"></div>
    </div>
  </div>

  <div id="loading">
    <div class="skeleton-grid">
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
      <div class="skeleton-card"><div class="skeleton-line name"></div><div class="skeleton-line aff"></div><div class="skeleton-line aff2"></div><div class="skeleton-line tag"></div></div>
    </div>
  </div>
  <div class="participant-grid" id="grid"></div>
</main>

<footer>
  <p>© 2026 CECEC &#8211; Central &amp; Eastern European Cheminformatics Conference &nbsp;·&nbsp; <a href="./">Back to main page</a></p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbwv6iJxKX_gDJJSmh58I07Z3b3LHLi-8fwNVhPRgVoyEnzflrpfUR6PgCMZxzMcovdS1g/exec';
const CACHE_KEY = 'cecec_participants';
const CACHE_TTL = 2 * 60 * 60 * 1000; // 2 hours

const FLAGS = {
  'Albania': '🇦🇱', 'Bulgaria': '🇧🇬', 'Croatia': '🇭🇷',
  'Czechia': '🇨🇿', 'Estonia': '🇪🇪', 'Hungary': '🇭🇺',
  'Latvia': '🇱🇻', 'Lithuania': '🇱🇹', 'Poland': '🇵🇱',
  'Romania': '🇷🇴', 'Serbia': '🇷🇸', 'Slovakia': '🇸🇰',
  'Slovenia': '🇸🇮', 'Ukraine': '🇺🇦', 'Other': '🌍'
};

const COLORS = [
  '#00C6D7','#00E5B0','#4A9EFF','#84c225','#F0A500',
  '#E05C8A','#A78BFA','#F97316','#34D399','#60A5FA',
  '#FBBF24','#F472B6','#A3E635','#2DD4BF','#818CF8'
];

function handleData(participants) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('count').textContent = participants.length;

  // Count by country
  const countryCounts = {};
  participants.forEach(p => {
    const c = p.country || 'Unknown';
    countryCounts[c] = (countryCounts[c] || 0) + 1;
  });

  // Sort countries by count descending, Other last
  const sorted = Object.entries(countryCounts).sort((a, b) => {
    if (a[0] === 'Other') return 1;
    if (b[0] === 'Other') return -1;
    return b[1] - a[1];
  });
  const labels = sorted.map(e => e[0]);
  const counts = sorted.map(e => e[1]);
  const colors = labels.map((_, i) => COLORS[i % COLORS.length]);
  const total = counts.reduce((a, b) => a + b, 0);

  // Show chart
  document.getElementById('chart-section').style.display = 'block';
  new Chart(document.getElementById('geoChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: counts, backgroundColor: colors, borderColor: '#0D1B2A', borderWidth: 2 }] },
    options: {
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed} (${Math.round(ctx.parsed / total * 100)}%)` }
      }},
      cutout: '55%'
    }
  });

  // Custom legend
  const legend = document.getElementById('chart-legend');
  sorted.forEach(([country, count], i) => {
    const pct = Math.round(count / total * 100);
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <span class="legend-dot" style="background:${colors[i]}"></span>
      <span>${country}</span>
      <span class="legend-count">${count} <span style="color:var(--gray);font-weight:400;">(${pct}%)</span></span>
    `;
    legend.appendChild(item);
  });

  // Render participant cards
  const grid = document.getElementById('grid');
  participants.sort((a, b) => {
    if ((a.country || '') === 'Other') return 1;
    if ((b.country || '') === 'Other') return -1;
    const cmp = (a.country || '').localeCompare(b.country || '');
    if (cmp !== 0) return cmp;
    return a.lastname.localeCompare(b.lastname);
  });

  participants.forEach(p => {
    const isOral = p.participation === 'Oral Presentation (15+5 min)';
    const flag = FLAGS[p.country] || '🌍';
    const card = document.createElement('div');
    card.className = 'participant-card';
    card.innerHTML = `
      <div class="participant-name">${p.firstname} ${p.lastname}</div>
      <div class="participant-affiliation">${p.affiliation || ''}</div>
      <div class="participant-country">${flag} ${p.country || ''}</div>
      <span class="participant-type ${isOral ? '' : 'attendee'}">${isOral ? 'Oral Presentation' : 'Attendee'}</span>
    `;
    grid.appendChild(card);
  });
}

// Try cache first for instant display
try {
  const cached = localStorage.getItem(CACHE_KEY);
  if (cached) {
    const { data, timestamp } = JSON.parse(cached);
    if (Date.now() - timestamp < CACHE_TTL) {
      handleData(data);
    } else {
      // Cache expired — show stale data instantly, refresh in background
      handleData(data);
      loadFresh();
    }
  } else {
    loadFresh();
  }
} catch(e) {
  loadFresh();
}

function loadFresh() {
  const script = document.createElement('script');
  script.onerror = () => {
    if (!document.getElementById('grid').children.length) {
      document.getElementById('loading').innerHTML = '<p style="color:var(--gray);font-style:italic;">Could not load participants. Please try again later.</p>';
    }
  };
  script.src = API_BASE + '?action=list&callback=handleDataAndCache';
  document.head.appendChild(script);
}

function handleDataAndCache(participants) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ data: participants, timestamp: Date.now() }));
  } catch(e) {}
  // Only re-render if we didn't already show cached data
  if (!document.getElementById('grid').children.length) {
    handleData(participants);
  }
}
</script>
</body>
</html>
